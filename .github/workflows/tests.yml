name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv lock --check
      - run: uv sync --locked --group test
      - run: uv run --locked python -m pytest
      - run: uv build
      - shell: python
        run: |
          import pathlib
          import subprocess
          import sys

          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")
          subprocess.run(
              [sys.executable, "tools/check_package_install.py", str(wheels[0])],
              check=True,
          )
